<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Duit Raya | AzlanMymo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .glass-dark { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; }
    </style>
</head>
<body class="bg-emerald-950 min-h-screen p-6 text-white font-sans">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <a href="index.html" class="text-yellow-400"><i class="fas fa-arrow-left"></i></a>
            <h1 class="text-lg font-bold tracking-widest uppercase">E-Raya Wallet</h1>
            <div class="w-6"></div>
        </header>

        <div class="glass-dark p-6 rounded-3xl mb-6 shadow-xl">
            <p class="text-[10px] text-emerald-300 uppercase font-bold tracking-widest">Jumlah Bajet Raya</p>
            <h2 class="text-3xl font-bold text-yellow-400 mt-1">RM 1,500.00</h2>
            <div class="mt-4 grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-3 rounded-xl text-center">
                    <p class="text-[9px] opacity-60">Agihan (QR)</p>
                    <p class="text-sm font-bold">RM 850</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl text-center">
                    <p class="text-[9px] opacity-60">Baki</p>
                    <p class="text-sm font-bold text-green-400">RM 650</p>
                </div>
            </div>
        </div>

        <div class="bg-white text-emerald-900 p-6 rounded-3xl shadow-2xl space-y-4">
            <h3 class="font-bold text-center text-sm uppercase"><i class="fas fa-qrcode mr-2"></i> Jana Kod QR Raya</h3>
            
            <div>
                <label class="block text-[10px] font-bold uppercase mb-1">Nama Penerima</label>
                <input type="text" id="recipientName" class="w-full p-3 rounded-xl border border-emerald-100 bg-gray-50 outline-none focus:ring-2 focus:ring-yellow-500" placeholder="Contoh: Amin (Anak Buah)">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase mb-1">Jumlah (RM)</label>
                <input type="number" id="amount" class="w-full p-3 rounded-xl border border-emerald-100 bg-gray-50 outline-none focus:ring-2 focus:ring-yellow-500" placeholder="RM 50">
            </div>

            <button onclick="generateQR()" class="w-full bg-emerald-800 text-yellow-400 font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-900 transition uppercase tracking-widest">
                Jana & Simpan
            </button>
        </div>

        <div id="qrResult" class="mt-6 hidden animate-bounce-in">
            <div class="bg-white p-6 rounded-3xl text-center shadow-2xl">
                <div id="qrcode" class="mb-4"></div>
                <p id="qrLabel" class="text-emerald-900 font-bold text-sm"></p>
                <p class="text-[10px] text-gray-400">Imbas untuk terima duit raya</p>
                <button onclick="window.print()" class="mt-4 text-[10px] text-emerald-600 underline">Cetak QR Untuk Sampul</button>
            </div>
        </div>
    </div>

    <script>
        function generateQR() {
            const name = document.getElementById('recipientName').value;
            const amount = document.getElementById('amount').value;
            const qrContainer = document.getElementById('qrcode');
            const resultDiv = document.getElementById('qrResult');

            if (!name || !amount) {
                alert("Sila isi nama dan jumlah!");
                return;
            }

            // Clear previous QR
            qrContainer.innerHTML = "";
            
            // Generate QR (Data format boleh di-adjust untuk API bank nanti)
            new QRCode(qrContainer, {
                text: `RAYA2026|${name}|RM${amount}|BY-AZLANMYMO`,
                width: 150,
                height: 150
            });

            document.getElementById('qrLabel').innerText = `Duit Raya: ${name} (RM${amount})`;
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
