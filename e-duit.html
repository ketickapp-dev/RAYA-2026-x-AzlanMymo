<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Duit Raya | AzlanMymo Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #022c22; }
        .glass-dark { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #qrcode { display: flex; justify-content: center; }
        #qrcode img { border: 12px solid white; border-radius: 1.5rem; shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .input-style { background: #f8fafc; border: 2px solid #e2e8f0; transition: 0.3s; }
        .input-style:focus { border-color: #10b981; background: white; }
    </style>
</head>
<body class="min-h-screen p-6 text-white pb-20">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <a href="index.html" class="w-10 h-10 glass-dark rounded-xl flex items-center justify-center text-yellow-400">
                <i class="fas fa-chevron-left"></i>
            </a>
            <div class="text-center">
                <h1 class="text-sm font-bold tracking-[0.2em] uppercase">E-Raya Wallet</h1>
                <p class="text-[8px] opacity-50 uppercase tracking-widest text-yellow-400">AzlanMymo Lab System</p>
            </div>
            <div class="w-10"></div>
        </header>

        <div class="glass-dark p-8 rounded-[2.5rem] mb-8 shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] text-emerald-400 uppercase font-bold tracking-widest mb-2">Anggaran Bajet Raya</p>
                <h2 class="text-4xl font-black text-yellow-400 italic">RM 1,500.00</h2>
                
                <div class="mt-6 grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] opacity-60 uppercase">Telah Dijana</p>
                        <p class="text-lg font-bold text-white">RM <span id="usedBudget">0</span></p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] opacity-60 uppercase">Baki Bajet</p>
                        <p class="text-lg font-bold text-emerald-400">RM <span id="remainingBudget">1500</span></p>
                    </div>
                </div>
            </div>
            <i class="fas fa-wallet absolute -right-6 -bottom-6 text-9xl opacity-10 -rotate-12"></i>
        </div>

        <div class="bg-white text-slate-800 p-8 rounded-[2.5rem] shadow-2xl space-y-6">
            <div class="text-center">
                <h3 class="font-black text-lg uppercase tracking-tight text-emerald-900">Jana QR Duit Raya</h3>
                <p class="text-[10px] text-slate-400 uppercase font-bold">Imbas & Terima Secara Digital</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Nama Penerima</label>
                    <input type="text" id="recipientName" class="input-style w-full p-4 rounded-2xl outline-none text-sm font-bold" placeholder="Cth: Amin (Anak Buah)">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Jumlah (RM)</label>
                    <input type="number" id="amount" class="input-style w-full p-4 rounded-2xl outline-none text-sm font-bold" placeholder="50">
                </div>

                <button onclick="generateQR()" class="w-full bg-emerald-900 text-yellow-400 font-black py-5 rounded-2xl shadow-xl hover:bg-emerald-800 transition-all uppercase tracking-[0.2em] text-xs">
                    Jana & Simpan QR
                </button>
            </div>
        </div>

        <div id="qrResult" class="mt-8 hidden animate-fade-in-up">
            <div class="bg-white p-8 rounded-[2.5rem] text-center shadow-2xl border-t-8 border-yellow-400">
                <div id="qrcode" class="mb-6"></div>
                
                <div class="space-y-1 mb-6">
                    <p id="qrLabel" class="text-emerald-900 font-black text-xl italic uppercase"></p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Selamat Hari Raya Aidilfitri</p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.print()" class="bg-slate-100 text-slate-600 font-bold py-3 rounded-xl text-[10px] uppercase">
                        <i class="fas fa-print mr-2"></i> Cetak
                    </button>
                    <button onclick="alert('Fungsi muat turun imej sedang diintegrasi!')" class="bg-emerald-100 text-emerald-700 font-bold py-3 rounded-xl text-[10px] uppercase">
                        <i class="fas fa-download mr-2"></i> Simpan Imej
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let totalUsed = 0;
        const initialBudget = 1500;

        function generateQR() {
            const name = document.getElementById('recipientName').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const qrContainer = document.getElementById('qrcode');
            const resultDiv = document.getElementById('qrResult');

            if (!name || !amount) {
                alert("Sila isi nama dan jumlah duit raya!");
                return;
            }

            // Update Budget
            totalUsed += amount;
            document.getElementById('usedBudget').innerText = totalUsed.toFixed(2);
            document.getElementById('remainingBudget').innerText = (initialBudget - totalUsed).toFixed(2);

            // Clear previous QR
            qrContainer.innerHTML = "";
            
            // Generate QR (Data format for AzlanMymo Lab)
            new QRCode(qrContainer, {
                text: `AZM-RAYA|TO:${name}|AMT:${amount}|REF:2026`,
                width: 200,
                height: 200,
                colorDark : "#064e3b",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById('qrLabel').innerText = `RM ${amount.toFixed(2)}`;
            resultDiv.classList.remove('hidden');
            
            // Auto scroll to result
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
