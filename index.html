<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYA 2026 Interaktif | AzlanMymo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #064e3b; color: #f0fdf4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .raya-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); transition: 0.3s; }
        .raya-card:hover { transform: translateY(-5px); border-color: #fcd34d; }
        .ketupat-bg { position: absolute; top: -20px; right: -20px; opacity: 0.2; font-size: 100px; transform: rotate(15deg); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="text-center my-10 relative w-full max-w-md">
        <i class="fas fa-mosque text-yellow-400 text-4xl mb-4"></i>
        <h1 class="text-3xl font-bold tracking-tight">RAYA 2026 <span class="text-yellow-400">Interaktif</span></h1>
        <p class="text-sm opacity-80 mt-2 italic text-green-200 underline decoration-yellow-500">bersama AzlanMymo</p>
    </header>

    <main class="w-full max-w-md space-y-4">
        
        <div class="raya-card p-6 rounded-2xl flex items-center gap-4 cursor-pointer">
            <div class="bg-yellow-500 p-4 rounded-xl text-emerald-900">
                <i class="fas fa-envelope-open-text text-2xl"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg text-yellow-300">Kad Raya Digital</h2>
                <p class="text-xs opacity-70">Hantar ucapan interaktif & animasi.</p>
            </div>
            <i class="fas fa-chevron-right text-yellow-500 opacity-50 text-sm"></i>
        </div>

        <div class="raya-card p-6 rounded-2xl flex items-center gap-4 cursor-pointer">
            <div class="bg-blue-500 p-4 rounded-xl text-white">
                <i class="fas fa-users text-2xl"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg text-blue-300">Pengurusan Tetamu</h2>
                <p class="text-xs opacity-70">RSVP Rumah Terbuka & Menu Digital.</p>
            </div>
            <i class="fas fa-chevron-right text-blue-500 opacity-50 text-sm"></i>
        </div>

        <div class="raya-card p-6 rounded-2xl flex items-center gap-4 cursor-pointer">
            <div class="bg-emerald-500 p-4 rounded-xl text-white">
                <i class="fas fa-wallet text-2xl"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg text-emerald-300">E-Duit Raya & Bajet</h2>
                <p class="text-xs opacity-70">Jana QR & urus agihan duit raya.</p>
            </div>
            <i class="fas fa-chevron-right text-emerald-500 opacity-50 text-sm"></i>
        </div>

    </main>

    <footer class="mt-auto py-8 text-center text-[10px] opacity-50 tracking-widest uppercase">
        <p>© 2026 Developed by AzlanMymo Mobile Lab</p>
    </footer>

</body>
</html>
