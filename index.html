<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYA 2026 Interaktif | AzlanMymo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #064e3b; color: #f0fdf4; }
        .raya-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            transition: 0.3s; 
        }
        .raya-card:hover { transform: translateY(-5px); border-color: #fcd34d; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="text-center my-12">
        <i class="fas fa-moon text-yellow-400 text-4xl mb-4"></i>
        <h1 class="text-3xl font-bold tracking-tight uppercase">Raya 2026 <span class="text-yellow-400">Interaktif</span></h1>
        <p class="text-xs opacity-70 mt-2">Platform Digital Eksklusif AzlanMymo</p>
    </header>

    <main class="w-full max-w-md space-y-4">
        
        <a href="kad-raya.html" class="raya-card p-6 rounded-2xl flex items-center gap-4 block">
            <div class="bg-yellow-500 p-4 rounded-xl text-emerald-900">
                <i class="fas fa-envelope-open-text text-2xl"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg text-yellow-300">Kad Raya Digital</h2>
                <p class="text-[10px] opacity-70">Animasi buka sampul & ucapan.</p>
            </div>
            <i class="fas fa-chevron-right text-yellow-500"></i>
        </a>

        <a href="ai-greeting.html" class="raya-card p-6 rounded-2xl flex items-center gap-4 block">
            <div class="bg-blue-500 p-4 rounded-xl text-white">
                <i class="fas fa-robot text-2xl"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg text-blue-300">AI Pantun Raya</h2>
                <p class="text-[10px] opacity-70">Jana ucapan raya automatik.</p>
            </div>
            <i class="fas fa-chevron-right text-blue-500"></i>
        </a>

        <a href="open-house.html" class="raya-card p-6 rounded-2xl flex items-center gap-4 block">
            <div class="bg-orange-500 p-4 rounded-xl text-white">
                <i class="fas fa-home text-2xl"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg text-orange-300">Smart RSVP</h2>
                <p class="text-[10px] opacity-70">Pengurusan tetamu & slot masa.</p>
            </div>
            <i class="fas fa-chevron-right text-orange-500"></i>
        </a>

        <a href="javascript:void(0)" onclick="checkAdmin()" class="raya-card p-6 rounded-2xl flex items-center gap-4 block">
            <div class="bg-emerald-700 p-4 rounded-xl text-yellow-400 border border-yellow-400/30">
                <i class="fas fa-chart-pie text-2xl"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg text-emerald-300">Admin Panel</h2>
                <p class="text-[10px] opacity-70">Pantau jualan & statistik sistem.</p>
            </div>
            <i class="fas fa-lock text-emerald-500"></i>
        </a>

    </main>

    <footer class="mt-auto py-10 text-[10px] opacity-40 tracking-widest uppercase">
        © 2026 AzlanMymo Labs
    </footer>

    <script>
        function checkAdmin() {
            const secretPass = "azlan2026"; 
            const input = prompt("Masukkan Kod Akses Admin:");

            if (input === secretPass) {
                sessionStorage.setItem("adminAuth", "true");
                window.location.href = "admin-dashboard.html";
            } else if (input !== null) {
                alert("Kod salah! Anda bukan AzlanMymo.");
            }
        }
    </script>

</body>
</html>
