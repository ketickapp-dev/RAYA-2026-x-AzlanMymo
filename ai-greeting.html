<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pantun Raya | AzlanMymo 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col items-center p-6 text-emerald-900">

    <div class="w-full max-w-md">
        <a href="index.html" class="text-white opacity-70 text-sm mb-6 inline-block">
            <i class="fas fa-arrow-left mr-2"></i> Kembali ke Hub
        </a>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-yellow-400">AI Greeting Generator</h1>
            <p class="text-emerald-100 text-xs">Cipta ucapan unik dengan kuasa AI</p>
        </div>

        <div class="glass p-6 rounded-3xl shadow-2xl space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-2">Nama Penerima</label>
                <input type="text" id="targetName" placeholder="Contoh: Sahabatku Ahmad" 
                    class="w-full p-3 rounded-xl border border-emerald-200 focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-2">Tema Ucapan</label>
                <select id="theme" class="w-full p-3 rounded-xl border border-emerald-200 outline-none">
                    <option value="formal">Klasik & Sopan</option>
                    <option value="keluarga">Kasih Sayang Keluarga</option>
                    <option value="lawak">Santai & Jenaka</option>
                    <option value="rindu">Rindu Kawan Lama</option>
                </select>
            </div>

            <button onclick="generatePantun()" 
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-emerald-900 font-bold py-4 rounded-xl transition shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-magic"></i> Jana Pantun Raya
            </button>
        </div>

        <div id="resultCard" class="mt-8 hidden animate-fade-in">
            <div class="bg-white p-6 rounded-3xl border-t-4 border-yellow-500 shadow-xl">
                <p id="pantunText" class="text-center italic leading-relaxed whitespace-pre-line"></p>
                <hr class="my-4">
                <button class="w-full text-sm font-semibold text-emerald-700">
                    <i class="fas fa-copy mr-2"></i> Salin & Masukkan Dalam Kad
                </button>
            </div>
        </div>
    </div>

    <script>
        function generatePantun() {
            const name = document.getElementById('targetName').value || "Penerima";
            const theme = document.getElementById('theme').value;
            const resultCard = document.getElementById('resultCard');
            const pantunText = document.getElementById('pantunText');

            // Simulasi AI Logic (Boleh disambung ke API OpenAI/Gemini nanti)
            let pantun = "";
            if(theme === 'lawak') {
                pantun = `Beli ketupat di pasar malam,\nJangan lupa beli rendang sekati;\nSelamat hari raya buat ${name} yang segak melam,\nDuit raya jangan lupa kongsi rezeki!`;
            } else if(theme === 'rindu') {
                pantun = `Pohon pelita di tepi halaman,\nTerang cahaya di malam raya;\nBuat ${name} teman zaman-berzaman,\nMaaf zahir batin di mana saja.`;
            } else {
                pantun = `Makan lemang bertambah-tambah,\nJuadah raya di atas meja;\nSemoga ukhuwah kita terus bertambah,\nSelamat Hari Raya buat ${name} sekeluarga.`;
            }

            pantunText.innerText = pantun;
            resultCard.classList.remove('hidden');
        }
    </script>
</body>
</html>
