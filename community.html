<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub | AzlanMymo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-emerald-950 min-h-screen p-6 text-white font-sans">

    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center">
            <a href="index.html" class="text-yellow-400"><i class="fas fa-arrow-left"></i></a>
            <h1 class="text-lg font-bold tracking-widest uppercase">Community Hub</h1>
            <div class="w-6"></div>
        </header>

        <div class="bg-white text-emerald-900 p-6 rounded-3xl shadow-xl">
            <h3 class="font-bold mb-4 uppercase text-xs tracking-wider"><i class="fas fa-map-marker-alt text-red-500 mr-2"></i> Lokasi Rumah Terbuka</h3>
            <div class="bg-gray-200 h-40 rounded-2xl flex items-center justify-center mb-4 overflow-hidden">
                <i class="fas fa-map-marked-alt text-4xl text-gray-400"></i>
            </div>
            <p class="text-[10px] font-medium leading-relaxed">No. 123, Jalan Raya Indah, Taman Syawal, 73200 Gemencheh, Negeri Sembilan.</p>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <a href="https://waze.com" class="bg-blue-500 text-white p-3 rounded-xl text-center text-xs font-bold">Waze</a>
                <a href="https://maps.google.com" class="bg-green-600 text-white p-3 rounded-xl text-center text-xs font-bold">Google Maps</a>
            </div>
        </div>

        <div class="bg-emerald-900 border border-emerald-800 p-6 rounded-3xl shadow-xl">
            <h3 class="font-bold mb-4 uppercase text-xs tracking-wider text-yellow-400"><i class="fas fa-drumstick-bite mr-2"></i> Senarai Potluck</h3>
            <div class="space-y-3">
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10">
                    <span class="text-xs">Ahmad & Keluarga</span>
                    <span class="bg-yellow-500 text-emerald-900 text-[10px] px-2 py-1 rounded font-bold uppercase">Satay Ayam</span>
                </div>
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10 opacity-60">
                    <span class="text-xs italic text-gray-400">Slot Kosong</span>
                    <button class="text-[9px] underline">Daftar Menu</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
