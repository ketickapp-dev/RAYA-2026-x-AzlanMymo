<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | AzlanMymo Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar-active { border-left: 4px solid #fcd34d; background: rgba(252, 211, 77, 0.1); }
        .stat-card { background: white; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-emerald-900 text-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <i class="fas fa-user-shield text-yellow-400"></i>
            <h1 class="font-bold tracking-tight">AZLAN<span class="text-yellow-400">MYMO</span> ADMIN</h1>
        </div>
        <button class="text-xl"><i class="fas fa-bars"></i></button>
    </header>

    <main class="p-4 space-y-6">
        
        <section class="grid grid-cols-2 gap-4">
            <div class="stat-card p-4 rounded-2xl shadow-sm">
                <p class="text-[10px] uppercase font-bold text-gray-400">Total Revenue</p>
                <h3 class="text-xl font-bold text-emerald-700">RM 2,450.00</h3>
                <p class="text-[10px] text-green-500 font-semibold">+12% vs semalam</p>
            </div>
            <div class="stat-card p-4 rounded-2xl shadow-sm">
                <p class="text-[10px] uppercase font-bold text-gray-400">Active Users</p>
                <h3 class="text-xl font-bold text-emerald-700">1,240</h3>
                <p class="text-[10px] text-blue-500 font-semibold">158 sedang online</p>
            </div>
        </section>

        <section>
            <h2 class="text-sm font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-chart-line text-emerald-600"></i> Prestasi Modul
            </h2>
            <div class="space-y-3">
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-yellow-500">
                    <div>
                        <p class="font-bold text-sm">Kad Raya AI</p>
                        <p class="text-[10px] text-gray-500">842 terjana hari ini</p>
                    </div>
                    <span class="bg-yellow-100 text-yellow-700 text-[10px] px-2 py-1 rounded-full font-bold">HOT</span>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-blue-500">
                    <div>
                        <p class="font-bold text-sm">Smart Open House</p>
                        <p class="text-[10px] text-gray-500">15 majlis didaftarkan</p>
                    </div>
                    <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-1 rounded-full font-bold">STABLE</span>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-sm font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-history text-emerald-600"></i> Transaksi Terkini
            </h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <table class="w-full text-left text-xs">
                    <thead class="bg-gray-100 text-gray-600 uppercase">
                        <tr>
                            <th class="p-3">User</th>
                            <th class="p-3">Modul</th>
                            <th class="p-3">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr>
                            <td class="p-3 font-medium">Hafiz R.</td>
                            <td class="p-3">Premium Card</td>
                            <td class="p-3 text-green-600 font-bold">Paid</td>
                        </tr>
                        <tr>
                            <td class="p-3 font-medium">Siti Aminah</td>
                            <td class="p-3">RSVP System</td>
                            <td class="p-3 text-green-600 font-bold">Paid</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <button class="fixed bottom-6 right-6 bg-emerald-900 text-yellow-400 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-xl border-2 border-yellow-400">
        <i class="fas fa-plus"></i>
    </button>

</body>
</html>
