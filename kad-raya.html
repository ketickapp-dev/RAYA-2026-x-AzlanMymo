<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kad Raya Interaktif | AzlanMymo Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #022c22; overflow-x: hidden; font-family: 'Poppins', sans-serif; }
        
        /* Kontena Sampul */
        .envelope-wrapper { height: 380px; margin-top: 50px; display: flex; justify-content: center; position: relative; }
        
        .envelope {
            position: relative; width: 300px; height: 200px;
            background: #065f46; border-radius: 0 0 15px 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Penutup Sampul (Flap) */
        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 110px solid #047857; transform-origin: top;
            transition: transform 0.6s ease; z-index: 3;
        }

        /* Kertas Kad */
        .letter {
            position: absolute; bottom: 10px; left: 10px;
            width: 280px; height: 180px; background: white;
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2; padding: 25px; color: #064e3b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Animasi Buka */
        .envelope.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope.open .letter { transform: translateY(-160px); height: 220px; z-index: 4; }

        /* Template Styles */
        .theme-classic { background: #fff; color: #064e3b; border: 4px double #d4af37; }
        .theme-modern { background: #1e293b; color: #f1f5f9; border: 2px solid #38bdf8; }
        .theme-floral { background: #fdf2f8; color: #be185d; border: 4px solid #f9a8d4; border-style: dotted; }

        .template-btn { transition: 0.3s; border: 2px solid transparent; }
        .template-btn.active { border-color: #fbbf24; transform: scale(1.1); }
    </style>
</head>
<body class="min-h-screen p-6 text-white">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full text-yellow-400">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="text-xs font-bold uppercase tracking-widest">Digital Greeting Card</h1>
        <div class="w-10"></div>
    </header>

    <div class="flex justify-center gap-4 mb-10">
        <button onclick="setTheme('classic')" id="btn-classic" class="template-btn active w-12 h-12 rounded-xl bg-white border-2"></button>
        <button onclick="setTheme('modern')" id="btn-modern" class="template-btn w-12 h-12 rounded-xl bg-slate-800"></button>
        <button onclick="setTheme('floral')" id="btn-floral" class="template-btn w-12 h-12 rounded-xl bg-pink-200"></button>
    </div>

    <div class="envelope-wrapper">
        <div id="envelope" class="envelope" onclick="toggleEnvelope()">
            <div class="flap shadow-lg"></div>
            <div id="letter" class="letter rounded-xl theme-classic">
                <i class="fas fa-moon text-yellow-500 text-2xl mb-2"></i>
                <h2 class="font-bold text-xl leading-tight">Selamat Hari Raya Aidilfitri</h2>
                <p class="text-[10px] mt-2 opacity-80 uppercase tracking-widest font-bold">Maaf Zahir & Batin</p>
                <div class="mt-6 border-t pt-4">
                    <p class="text-[10px] italic">- Ikhlas daripada -</p>
                    <p class="font-bold text-sm tracking-tighter">AzlanMymo & Keluarga</p>
                </div>
            </div>
            <div class="absolute bottom-0 w-full h-full bg-emerald-800/50 rounded-b-15 z-3"></div>
        </div>
    </div>

    <div class="text-center mt-12">
        <p class="text-[10px] text-yellow-400 font-bold uppercase animate-pulse">Klik Sampul Untuk Buka</p>
        <div id="music-status" class="mt-4 text-[9px] opacity-40 flex items-center justify-center gap-2">
            <i class="fas fa-music"></i> <span>Audio Ready</span>
        </div>
    </div>

    <audio id="rayaAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

    <script>
        let isOpened = false;
        const audio = document.getElementById('rayaAudio');

        function toggleEnvelope() {
            const env = document.getElementById('envelope');
            isOpened = !isOpened;
            
            env.classList.toggle('open');

            if (isOpened) {
                audio.play().catch(e => console.log("Autoplay blocked, user interaction required"));
                document.getElementById('music-status').innerHTML = '<i class="fas fa-volume-up text-green-400"></i> <span class="text-green-400 uppercase">Playing: Suasana Hari Raya</span>';
            } else {
                audio.pause();
                document.getElementById('music-status').innerHTML = '<i class="fas fa-volume-mute"></i> <span>Audio Paused</span>';
            }
        }

        function setTheme(theme) {
            const letter = document.getElementById('letter');
            const btns = document.querySelectorAll('.template-btn');
            
            // Reset buttons
            btns.forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + theme).classList.add('active');

            // Apply theme
            letter.className = 'letter rounded-xl theme-' + theme;
            
            // Feedback
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }
    </script>
</body>
</html>
