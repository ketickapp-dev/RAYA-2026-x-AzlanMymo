<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Greeting Card | AzlanMymo Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;700&display=swap');
        
        body { background: #022c22; font-family: 'Poppins', sans-serif; transition: 0.5s; }
        
        /* Tema Ilustrasi */
        .theme-anime { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1578632292335-df3abbb0d586?q=80&w=500') center/cover; color: #fff; border: 4px solid #f472b6; }
        .theme-tradisional { background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('https://www.toptal.com/designers/subtlepatterns/uploads/batik-dots.png'); color: #064e3b; border: 6px double #b45309; font-family: 'serif'; }
        .theme-modern { background: #0f172a; color: #38bdf8; border: 2px solid #38bdf8; box-shadow: 0 0 15px #38bdf8; }
        .theme-cartoon { background: #fef08a; color: #92400e; border: 4px dashed #f59e0b; border-radius: 40px !important; }

        /* Animasi Sampul */
        .envelope-wrapper { height: 420px; perspective: 1000px; display: flex; justify-content: center; align-items: flex-end; }
        .envelope { position: relative; width: 320px; height: 220px; background: #065f46; border-radius: 0 0 15px 15px; cursor: pointer; transform-style: preserve-3d; transition: 0.5s; }
        .flap { position: absolute; top: 0; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-top: 120px solid #047857; transform-origin: top; transition: 0.6s; z-index: 3; }
        .envelope.open .flap { transform: rotateX(180deg); z-index: 1; }
        
        /* Kertas Kad */
        .letter { position: absolute; bottom: 10px; left: 10px; width: 300px; height: 200px; transition: 0.8s; z-index: 2; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .envelope.open .letter { transform: translateY(-180px); height: 280px; z-index: 4; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .hidden-input { display: none; }
        .custom-btn { @apply bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg text-[10px] font-bold transition-all border border-white/10; }
    </style>
</head>
<body class="min-h-screen p-4 pb-20">

    <aside class="max-w-md mx-auto mb-8 space-y-4 bg-black/30 p-4 rounded-3xl backdrop-blur-md border border-white/5">
        <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-yellow-400 text-center">Customizer Pro</h2>
        
        <div class="grid grid-cols-4 gap-2">
            <button onclick="setTheme('anime')" class="text-[9px] font-bold bg-pink-500 p-2 rounded-lg">ANIME</button>
            <button onclick="setTheme('tradisional')" class="text-[9px] font-bold bg-amber-700 p-2 rounded-lg">TRADISI</button>
            <button onclick="setTheme('modern')" class="text-[9px] font-bold bg-blue-600 p-2 rounded-lg">MODERN</button>
            <button onclick="setTheme('cartoon')" class="text-[9px] font-bold bg-yellow-500 p-2 rounded-lg">KARTUN</button>
        </div>

        <div class="space-y-2">
            <input type="text" id="inputNama" oninput="updateCard()" placeholder="Nama Anda" class="w-full bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/10 focus:border-yellow-400">
            <textarea id="inputUcapan" oninput="updateCard()" placeholder="Tulis ucapan anda di sini..." class="w-full bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/10 focus:border-yellow-400 h-16"></textarea>
        </div>

        <div class="flex items-center justify-between bg-emerald-900/50 p-3 rounded-xl border border-emerald-500/30">
            <div class="flex items-center gap-3">
                <i class="fas fa-music text-yellow-400"></i>
                <span id="fileName" class="text-[9px] opacity-60">Muat naik lagu MP3...</span>
            </div>
            <label class="custom-btn cursor-pointer">
                UPLOAD <input type="file" id="audioUpload" accept="audio/*" class="hidden-input" onchange="handleAudio(this)">
            </label>
        </div>
    </aside>

    <div class="envelope-wrapper">
        <div id="envelope" class="envelope" onclick="toggleEnvelope()">
            <div class="flap"></div>
            <div id="letter" class="letter rounded-2xl theme-tradisional shadow-2xl">
                <h3 id="displayNama" class="text-lg font-bold italic" style="font-family: 'Dancing Script', cursive;">AzlanMymo</h3>
                <p id="displayUcapan" class="text-xs mt-3 leading-relaxed">Selamat Hari Raya Aidilfitri, Maaf Zahir & Batin daripada kami sekeluarga!</p>
                <div class="mt-4 pt-4 border-t border-black/10">
                    <p class="text-[8px] uppercase tracking-widest font-bold">Raya 2026 Interactive</p>
                </div>
            </div>
            <div class="absolute bottom-0 w-full h-full bg-emerald-800/40 rounded-b-15 z-[3] pointer-events-none"></div>
        </div>
    </div>

    <div class="text-center mt-12 space-y-4">
        <p class="text-[10px] text-yellow-400 font-bold uppercase animate-pulse">Sentuh sampul untuk buka</p>
        <button onclick="location.reload()" class="text-[9px] opacity-40 underline">Reset Kad</button>
    </div>

    <audio id="rayaAudio" loop></audio>

    <script>
        let isOpened = false;
        const audio = document.getElementById('rayaAudio');

        // Fungsi Update Teks Secara Live
        function updateCard() {
            const nama = document.getElementById('inputNama').value || 'AzlanMymo';
            const ucapan = document.getElementById('inputUcapan').value || 'Selamat Hari Raya Aidilfitri, Maaf Zahir & Batin daripada kami sekeluarga!';
            
            document.getElementById('displayNama').innerText = nama;
            document.getElementById('displayUcapan').innerText = ucapan;
        }

        // Fungsi Tukar Tema Ilustrasi
        function setTheme(theme) {
            const letter = document.getElementById('letter');
            letter.className = `letter rounded-2xl shadow-2xl theme-${theme}`;
            
            // Tukar warna sampul ikut tema
            const env = document.getElementById('envelope');
            if(theme === 'anime') env.style.background = '#be185d';
            else if(theme === 'modern') env.style.background = '#1e293b';
            else if(theme === 'cartoon') env.style.background = '#d97706';
            else env.style.background = '#065f46';
        }

        // Fungsi Handle Audio Upload
        function handleAudio(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    audio.src = e.target.result;
                    document.getElementById('fileName').innerText = input.files[0].name;
                    document.getElementById('fileName').classList.add('text-green-400');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function toggleEnvelope() {
            const env = document.getElementById('envelope');
            isOpened = !isOpened;
            env.classList.toggle('open');

            if (isOpened) {
                if(audio.src) audio.play();
            } else {
                audio.pause();
            }
        }
    </script>
</body>
</html>
