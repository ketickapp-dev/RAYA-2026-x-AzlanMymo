<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Card | AzlanMymo Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;700&display=swap');
        
        body { background: #022c22; font-family: 'Poppins', sans-serif; }
        
        /* Default Card Styling */
        .letter { 
            position: absolute; bottom: 10px; left: 10px; 
            width: 300px; height: 200px; transition: 0.8s; 
            z-index: 2; padding: 25px; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
            background: white; /* Default background */
            background-size: cover; background-position: center;
            border: 4px solid #d4af37; /* Gold border */
        }

        /* Overlay untuk pastikan teks boleh dibaca jika gambar cerah */
        .text-overlay {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px; border-radius: 15px; color: white;
            backdrop-filter: blur(2px);
        }

        /* Animasi Sampul */
        .envelope-wrapper { height: 420px; perspective: 1000px; display: flex; justify-content: center; align-items: flex-end; }
        .envelope { position: relative; width: 320px; height: 220px; background: #065f46; border-radius: 0 0 15px 15px; cursor: pointer; transform-style: preserve-3d; transition: 0.5s; }
        .flap { position: absolute; top: 0; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-top: 120px solid #047857; transform-origin: top; transition: 0.6s; z-index: 3; }
        .envelope.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope.open .letter { transform: translateY(-180px); height: 280px; z-index: 4; shadow: 0 20px 40px rgba(0,0,0,0.6); }

        .hidden-input { display: none; }
        .control-panel { background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-4 pb-24">

    <aside class="max-w-md mx-auto mb-8 space-y-4 control-panel p-6 rounded-[2rem]">
        <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-yellow-400 text-center mb-4">Kad Raya Designer</h2>
        
        <div class="space-y-3">
            <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/10">
                <span class="text-[10px] text-white/60 ml-2">Guna Gambar Sendiri</span>
                <label class="bg-yellow-500 text-emerald-900 px-4 py-2 rounded-xl text-[10px] font-bold cursor-pointer hover:bg-yellow-400 transition">
                    PILIH FOTO <input type="file" id="imageUpload" accept="image/*" class="hidden-input" onchange="handleImage(this)">
                </label>
            </div>

            <input type="text" id="inputNama" oninput="updateCard()" placeholder="Nama Pengirim" class="w-full bg-white/5 p-4 rounded-2xl text-xs text-white outline-none border border-white/10 focus:border-yellow-400">
            <textarea id="inputUcapan" oninput="updateCard()" placeholder="Tulis ucapan anda..." class="w-full bg-white/5 p-4 rounded-2xl text-xs text-white outline-none border border-white/10 focus:border-yellow-400 h-20"></textarea>

            <div class="flex items-center justify-between bg-emerald-900/40 p-3 rounded-2xl border border-emerald-500/20">
                <span id="fileName" class="text-[9px] text-emerald-300 ml-2">Muat naik lagu raya...</span>
                <label class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold cursor-pointer hover:bg-emerald-500 transition">
                    UPLOAD MP3 <input type="file" id="audioUpload" accept="audio/*" class="hidden-input" onchange="handleAudio(this)">
                </label>
            </div>
        </div>
    </aside>

    <div class="envelope-wrapper">
        <div id="envelope" class="envelope" onclick="toggleEnvelope()">
            <div class="flap"></div>
            <div id="letter" class="letter rounded-2xl shadow-2xl">
                <div id="cardOverlay" class="hidden"> <h3 id="displayNama" class="text-xl font-bold italic" style="font-family: 'Dancing Script', cursive;">AzlanMymo</h3>
                    <p id="displayUcapan" class="text-xs mt-4 leading-relaxed font-light">Selamat Hari Raya Aidilfitri, Maaf Zahir & Batin daripada kami sekeluarga!</p>
                </div>
                <div id="defaultContent">
                    <h3 id="displayNamaDef" class="text-xl font-bold italic text-emerald-900" style="font-family: 'Dancing Script', cursive;">AzlanMymo</h3>
                    <p id="displayUcapanDef" class="text-xs mt-4 leading-relaxed text-slate-600">Selamat Hari Raya Aidilfitri, Maaf Zahir & Batin!</p>
                </div>
            </div>
            <div class="absolute bottom-0 w-full h-full bg-emerald-800/40 rounded-b-15 z-[3] pointer-events-none"></div>
        </div>
    </div>

    <div class="text-center mt-12">
        <p class="text-[10px] text-yellow-400 font-bold uppercase tracking-widest animate-pulse">Sentuh sampul untuk buka</p>
    </div>

    <audio id="rayaAudio" loop></audio>

    <script>
        let isOpened = false;
        const audio = document.getElementById('rayaAudio');

        function updateCard() {
            const nama = document.getElementById('inputNama').value || 'AzlanMymo';
            const ucapan = document.getElementById('inputUcapan').value || 'Selamat Hari Raya Aidilfitri, Maaf Zahir & Batin!';
            
            document.getElementById('displayNama').innerText = nama;
            document.getElementById('displayNamaDef').innerText = nama;
            document.getElementById('displayUcapan').innerText = ucapan;
            document.getElementById('displayUcapanDef').innerText = ucapan;
        }

        // Fungsi Upload Gambar Background
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const letter = document.getElementById('letter');
                    letter.style.backgroundImage = `url('${e.target.result}')`;
                    
                    // Tukar warna teks dan aktifkan overlay supaya nampak jelas
                    document.getElementById('cardOverlay').className = "text-overlay shadow-lg";
                    document.getElementById('defaultContent').className = "hidden";
                    letter.style.border = "none";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Fungsi Upload Audio
        function handleAudio(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    audio.src = e.target.result;
                    document.getElementById('fileName').innerText = "Lagu: " + input.files[0].name;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function toggleEnvelope() {
            const env = document.getElementById('envelope');
            isOpened = !isOpened;
            env.classList.toggle('open');

            if (isOpened && audio.src) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>
</body>
</html>
